<template>
    <!-- Loading state while the token is being validated against the org -->
    <template lwc:if={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <!-- Error states: invalid token, already submitted, or link expired -->
    <template lwc:elseif={isInvalidState}>
        <div class="slds-card slds-card_boundary slds-p-around_large error-card">
            <h2 class="slds-text-heading_medium slds-m-bottom_small">{stateHeading}</h2>
            <p class="slds-text-body_regular">{stateMessage}</p>
        </div>
    </template>

    <!-- Intake form shown when the token is valid and the credential is Requested -->
    <template lwc:elseif={isForm}>
        <div class="slds-card slds-card_boundary slds-p-around_large">
            <h2 class="slds-text-heading_medium slds-m-bottom_medium">Submit Credential</h2>
            <p class="slds-text-body_regular slds-m-bottom_medium">
                Credential Type: <strong>{credentialType}</strong>
            </p>

            <!-- Inline error displayed after a failed submit attempt, allowing retry -->
            <template lwc:if={errorMessage}>
                <div class="slds-notify slds-notify_alert error-alert slds-m-bottom_medium" role="alert">
                    <span>{errorMessage}</span>
                </div>
            </template>

            <div class="slds-form slds-form_stacked">

                <!-- Issued By - required for all credential types -->
                <div class="slds-form-element slds-m-bottom_small">
                    <label class="slds-form-element__label" for="issuedBy">
                        <abbr class="slds-required" title="required">*</abbr> Issued By
                    </label>
                    <div class="slds-form-element__control">
                        <input type="text"
                               id="issuedBy"
                               class="slds-input"
                               placeholder="Name of issuing organisation or authority"
                               value={issuedBy}
                               onchange={handleIssuedByChange}
                               maxlength="255" />
                    </div>
                </div>

                <!-- Expiry Date - hidden when the credential type does not expire -->
                <template lwc:if={showExpiryDate}>
                    <div class="slds-form-element slds-m-bottom_small">
                        <label class="slds-form-element__label" for="expiryDate">
                            <abbr class="slds-required" title="required">*</abbr> Expiry Date
                        </label>
                        <div class="slds-form-element__control">
                            <input type="date"
                                   id="expiryDate"
                                   class="slds-input"
                                   value={expiryDate}
                                   onchange={handleExpiryDateChange} />
                        </div>
                    </div>
                </template>

                <!-- File upload uses a native input instead of lightning-file-upload.
                     lightning-file-upload does not function for guest users on LWR
                     sites. The native input is visually hidden and triggered by its
                     associated label, which is styled as a button. -->
                <div class="slds-form-element slds-m-bottom_small">
                    <span class="slds-form-element__label">
                        <abbr class="slds-required" title="required">*</abbr> Supporting Documents
                    </span>
                    <div class="slds-form-element__control">
                        <label for="fileInput" class="file-upload-label slds-button slds-button_neutral">
                            Choose Files
                        </label>
                        <input type="file"
                               id="fileInput"
                               class="file-input-hidden"
                               multiple
                               accept=".pdf,.jpg,.jpeg,.png"
                               onchange={handleFileChange} />
                    </div>
                    <p class="slds-form-element__help slds-m-top_xx-small">
                        Accepted formats: PDF, JPG, PNG. Maximum 4 MB per file.
                    </p>
                </div>

                <!-- List of files selected by the volunteer -->
                <template lwc:if={hasFiles}>
                    <ul class="file-list slds-m-bottom_small">
                        <template for:each={selectedFiles} for:item="file">
                            <li key={file.name} class="file-list-item">
                                <span class="file-name">{file.name}</span>
                                <span class="file-size">({file.sizeFormatted})</span>
                            </li>
                        </template>
                    </ul>
                </template>

                <button class="slds-button slds-button_brand slds-m-top_medium"
                        onclick={handleSubmit}>
                    Submit
                </button>

            </div>
        </div>
    </template>

    <!-- Submitting state: shown while Apex calls are in flight -->
    <template lwc:elseif={isSubmitting}>
        <lightning-spinner alternative-text="Uploading" label="Uploading..." size="medium">
        </lightning-spinner>
    </template>

    <!-- Success screen shown after all Apex calls complete -->
    <template lwc:elseif={isSuccess}>
        <div class="slds-card slds-card_boundary slds-p-around_large success-card">
            <h2 class="slds-text-heading_medium slds-m-bottom_small">Submitted Successfully</h2>
            <p class="slds-text-body_regular">
                Thank you. Your credential details have been received and are now under review.
                You will be contacted once the submission has been assessed.
            </p>
        </div>
    </template>
</template>
